<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulut Kütüphane Yönetimi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { margin-bottom: 30px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header-bg { background: #0d6efd; color: white; padding: 20px; border-radius: 10px; margin-bottom: 40px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-bg text-center">
        <h1>📚 Bulut Kütüphane Otomasyonu</h1>
        <p>AWS EC2 + Docker + PostgreSQL + Spring Boot</p>
    </div>

    <div class="card">
        <div class="card-header bg-dark text-white"><h5>✍️ Yazarlar</h5></div>
        <div class="card-body">
            <table class="table table-hover">
                <thead><tr><th>ID</th><th>İsim</th><th>Adres</th></tr></thead>
                <tbody id="authorTable"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-success text-white"><h5>📖 Kitaplar</h5></div>
        <div class="card-body">
            <table class="table table-hover">
                <thead><tr><th>ID</th><th>Başlık</th><th>Yayınevi</th></tr></thead>
                <tbody id="bookTable"></tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white"><h5>🗓️ Yayınlanan Eserler (İlişkiler)</h5></div>
        <div class="card-body text-center" id="publishList">
        </div>
    </div>
</div>

<script>
    // 1. Yazarları Çek
    fetch('/api/authors').then(res => res.json()).then(data => {
        let html = '';
        data.forEach(a => html += `<tr><td>${a.id}</td><td>${a.name}</td><td>${a.address || '-'}</td></tr>`);
        document.getElementById('authorTable').innerHTML = html || '<tr><td colspan="3">Kayıt yok</td></tr>';
    });

    // 2. Kitapları Çek
    fetch('/api/books').then(res => res.json()).then(data => {
        let html = '';
        data.forEach(b => html += `<tr><td>${b.id}</td><td>${b.title}</td><td>${b.publisher}</td></tr>`);
        document.getElementById('bookTable').innerHTML = html || '<tr><td colspan="3">Kayıt yok</td></tr>';
    });

    // 3. Yayınları Çek (Daha şık bir görünüm)
    fetch('/api/publishes').then(res => res.json()).then(data => {
        let html = '<div class="row">';
        data.forEach(p => {
            html += `
                <div class="col-md-4">
                    <div class="border p-3 mb-2 rounded bg-white">
                        <strong>Yayın ID: ${p.id}</strong><br>
                        <span class="badge bg-info text-dark">Basım: ${p.edition}. Baskı</span><br>
                        <small class="text-muted">Tarih: ${p.publishDate}</small>
                    </div>
                </div>`;
        });
        html += '</div>';
        document.getElementById('publishList').innerHTML = data.length ? html : 'Henüz bir yayın bağlanmadı.';
    });
</script>
</body>
</html>
