<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Library Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-header { background: #2c3e50; color: white; padding: 30px 0; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .card-header { border-radius: 12px 12px 0 0 !important; font-weight: bold; font-size: 1.1rem; }
        .table thead { background-color: #f8f9fa; }
        .badge-edition { background-color: #e67e22; color: white; }
    </style>
</head>
<body>

<header class="main-header text-center">
    <div class="container">
        <h1>📚 Library Management Dashboard</h1>
        <p class="lead mb-0">Real-time Data Management System</p>
    </div>
</header>

<div class="container">
    <div class="row">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header bg-primary text-white">Authors</div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead><tr><th>ID</th><th>Name</th><th>Location</th></tr></thead>
                        <tbody id="authorTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card">
                <div class="card-header bg-success text-white">Books</div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead><tr><th>ID</th><th>Title</th><th>Publisher</th></tr></thead>
                        <tbody id="bookTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-dark text-white text-center">Published Works & Relations</div>
                <div class="card-body p-0">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-secondary">
                        <tr class="text-center">
                            <th>#</th>
                            <th>Author Name</th>
                            <th>Book Title</th>
                            <th>Edition</th>
                            <th>Release Date</th>
                        </tr>
                        </thead>
                        <tbody id="publishTable" class="text-center">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Fetch Authors
    fetch('/api/authors').then(res => res.json()).then(data => {
        let html = '';
        data.forEach(a => html += `<tr><td><strong>${a.id}</strong></td><td>${a.name}</td><td>${a.address || 'N/A'}</td></tr>`);
        document.getElementById('authorTable').innerHTML = html || '<tr><td colspan="3">No authors found.</td></tr>';
    });

    // Fetch Books
    fetch('/api/books').then(res => res.json()).then(data => {
        let html = '';
        data.forEach(b => html += `<tr><td><strong>${b.id}</strong></td><td>${b.title}</td><td>${b.publisher}</td></tr>`);
        document.getElementById('bookTable').innerHTML = html || '<tr><td colspan="3">No books found.</td></tr>';
    });

    // Fetch Published Works (Showing the link between Author and Book)
    fetch('/api/publishes').then(res => res.json()).then(data => {
        let html = '';
        data.forEach(p => {
            html += `
                <tr>
                    <td>${p.id}</td>
                    <td class="fw-bold text-primary">${p.author ? p.author.name : 'Unknown Author'}</td>
                    <td class="font-italic text-success">"${p.book ? p.book.title : 'Unknown Book'}"</td>
                    <td><span class="badge badge-edition">${p.edition}st Edition</span></td>
                    <td><small class="text-muted">${p.publishDate}</small></td>
                </tr>`;
        });
        document.getElementById('publishTable').innerHTML = html || '<tr><td colspan="5">No records found.</td></tr>';
    });
</script>
</body>
</html>
